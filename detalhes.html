<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes · Harry Potter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/detalhes.css">
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg fixed-top cabecalho">
            <div class="container">
                <a class="navbar-brand" href="index.html">
                    <img src="imgs/HP-logo.png" alt="Harry Potter" height="80px">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                    <div class="navbar-nav">
                        <a class="nav-link cabecalhocor" href="index.html"><strong>Início</strong></a>
                        <a class="nav-link cabecalhocor" href="index.html#filmes"><strong>Filmes</strong></a>
                        <a class="nav-link cabecalhocor" href="#"><strong>Personagens</strong></a>
                        <a class="nav-link cabecalhocor" href="#"><strong>Casas</strong></a>
                        <a class="nav-link cabecalhocor" href="#"><strong>Feitiços</strong></a>
                        <a class="nav-link cabecalhocor" href="#"><strong>Mundo Mágico</strong></a>
                        <a class="nav-link cabecalhocor" href="#"><strong>Quiz</strong></a>
                    </div>
                    <form class="d-flex ms-5" role="search">
                        <input class="form-control me-2" type="search" placeholder="Pesquisar">
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <div class="container py-5">

            <a href="index.html#filmes" class="btn-voltar">← Voltar para os filmes</a>

            <section class="detalhe-info mt-4">
                <div class="row g-4">
                    <div class="col-md-4 text-center">
                        <img id="detalheImagem" src="" alt="" class="detalhe-poster"/>
                    </div>
                    <div class="col-md-8">
                        <span class="detalhe-badge" id="detalheAno"></span>
                        <h1 class="detalhe-titulo" id="detalheTitulo"></h1>

                        <div class="detalhe-meta">
                            <div class="detalhe-meta-item">
                                <span class="detalhe-meta-label">🎬 Diretor</span>
                                <span class="detalhe-meta-valor" id="detalheDiretor"></span>
                            </div>
                            <div class="detalhe-meta-item">
                                <span class="detalhe-meta-label">⏱️ Duração</span>
                                <span class="detalhe-meta-valor" id="detalheDuracao"></span>
                            </div>
                            <div class="detalhe-meta-item">
                                <span class="detalhe-meta-label">📅 Ano</span>
                                <span class="detalhe-meta-valor" id="detalheAnoDup"></span>
                            </div>
                            <div class="detalhe-meta-item">
                                <span class="detalhe-meta-label">⚡ Filme</span>
                                <span class="detalhe-meta-valor" id="detalheParte"></span>
                            </div>
                        </div>

                        <div class="detalhe-sinopse-box">
                            <h5 class="detalhe-sinopse-label">Sinopse</h5>
                            <p id="detalheSinopse"></p>
                        </div>
                    </div>
                </div>
            </section>

            <section class="mt-5">
                <h2 class="detalhe-secao-titulo">📸 Cenas do Filme</h2>
                <div class="row g-3" id="listaFotos"></div>
            </section>

        </div>
    </main>

    <footer class="rodape mt-5 py-4 text-center">
        <p class="mb-2">© 2026 Harry Potter. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/detalhes.js"></script>
</body>
</html>
